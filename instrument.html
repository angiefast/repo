<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instrument · Echoes of Asia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<!-- TOP NAV — stays visible on the info/description view -->
<nav class="top-nav">
  <span class="top-nav-brand">Echoes of Asia</span>
  <a href="index.html" class="top-nav-tab active">Instruments</a>
  <a href="about.html" class="top-nav-tab">About</a>
  <a href="help.html"  class="top-nav-tab">Help</a>
</nav>

<div class="page-content" id="info-view">

  <!-- NAV -->
  <nav class="detail-nav">
    <a href="index.html" class="back-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      All Instruments
    </a>
    <span class="detail-period-tag" id="period-tag"></span>
  </nav>

  <!-- HERO -->
  <div class="detail-hero">
    <!-- Nature art injected by JS -->
    <div class="detail-icon" id="detail-icon"></div>
    <div class="detail-title-block">
      <h1 class="detail-name" id="detail-name"></h1>
      <p class="detail-native" id="detail-native"></p>
      <div class="detail-badges">
        <span class="region-badge" id="region-badge"></span>
        <span class="region-badge" id="type-badge" style="background:rgba(26,13,7,0.07);color:var(--ink-mid);border-color:rgba(26,13,7,0.15);"></span>
      </div>
    </div>
  </div>

  <!-- INFO -->
  <div class="info-section">
    <div class="instrument-photo-wrap" id="photo-wrap"></div>
    <div class="info-block">
      <div class="info-label">History &amp; Origins</div>
      <p class="info-text" id="info-history"></p>
    </div>
    <div class="info-block">
      <div class="info-label">How to Play</div>
      <p class="info-text" id="info-howto"></p>
    </div>
  </div>

  <!-- PLAY CTA -->
  <div class="play-cta">
    <button class="play-btn" id="start-btn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4 3l10 5-10 5V3z"/></svg>
      Start Playing
    </button>
  </div>

</div>

<!-- PLAY VIEW (hidden until Start Playing) -->
<div id="play-view">
  <div class="play-topbar">
    <a href="index.html" class="play-home-btn">⟵ All Instruments</a>
    <span class="play-instrument-name" id="play-name" style="flex:1;text-align:center;"></span>
    <button class="exit-btn" id="exit-btn">✕ Exit</button>
  </div>
  <div class="play-area" id="play-area"></div>
  <div class="play-footer">
    <p class="play-hint" id="play-hint"></p>
    <p class="kb-hint" id="kb-hint"></p>
  </div>
</div>

<script src="js/instruments.js"></script>
<script src="js/play.js"></script>
<script>
const ICONS = {

  </svg>`,

    <rect x="8" y="44" width="94" height="20" rx="10" transform="rotate(-15 55 54)"/>

    <circle cx="78" cy="47" r="4" fill="currentColor" opacity="0.6" transform="rotate(-15 55 54)"/>
  </svg>`,
  shakuhachi: `<svg viewBox="0 0 110 110" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg">

    <circle cx="56" cy="26" r="3.5" fill="currentColor" opacity="0.65" transform="rotate(8 55 55)"/>
    <circle cx="56" cy="42" r="3.5" fill="currentColor" opacity="0.65" transform="rotate(8 55 55)"/>
    <circle cx="56" cy="58" r="3.5" fill="currentColor" opacity="0.65" transform="rotate(8 55 55)"/>
    <circle cx="56" cy="74" r="3.5" fill="currentColor" opacity="0.65" transform="rotate(8 55 55)"/>
  </svg>`,
  veena: `<svg viewBox="0 0 110 110" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="55" cy="85" rx="24" ry="20"/>
    <ellipse cx="40" cy="28" rx="14" ry="11"/>
    <path d="M55,65 Q58,44 40,39"/>
    <line x1="18" y1="28" x2="86" y2="28" stroke-width="1.4" opacity="0.5"/>
    <path d="M86,28 Q96,28 96,18" stroke-width="1.8"/>
  </svg>`,
  gayageum: `<svg viewBox="0 0 110 110" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="38" width="90" height="34" rx="4"/>
    <line x1="22" y1="43" x2="22" y2="68" stroke-width="1.5" opacity="0.6"/>
    <line x1="35" y1="43" x2="35" y2="68" stroke-width="1.5" opacity="0.6"/>
    <line x1="48" y1="43" x2="48" y2="68" stroke-width="1.5" opacity="0.6"/>
    <line x1="61" y1="43" x2="61" y2="68" stroke-width="1.5" opacity="0.6"/>
    <line x1="74" y1="43" x2="74" y2="68" stroke-width="1.5" opacity="0.6"/>
    <line x1="87" y1="43" x2="87" y2="68" stroke-width="1.5" opacity="0.6"/>
  </svg>`,
  dantranh: `<svg viewBox="0 0 110 110" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
    <rect x="5" y="42" width="100" height="28" rx="4"/>
    <line x1="15"  y1="47" x2="15"  y2="65" stroke-width="1.3" opacity="0.55"/>
    <line x1="27"  y1="47" x2="27"  y2="65" stroke-width="1.3" opacity="0.55"/>
    <line x1="39"  y1="47" x2="39"  y2="65" stroke-width="1.3" opacity="0.55"/>
    <line x1="51"  y1="47" x2="51"  y2="65" stroke-width="1.3" opacity="0.55"/>
    <line x1="63"  y1="47" x2="63"  y2="65" stroke-width="1.3" opacity="0.55"/>
    <line x1="75"  y1="47" x2="75"  y2="65" stroke-width="1.3" opacity="0.55"/>

  gamelan: `<svg viewBox="0 0 110 110" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
    <rect x="8"  y="18" width="94" height="15" rx="4"/>

    <rect x="32" y="90" width="46" height="10" rx="4"/>
  </svg>`,
  tabla: `<svg viewBox="0 0 110 110" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="32" cy="55" rx="25" ry="28"/>
    <ellipse cx="32" cy="55" rx="15" ry="17" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="80" cy="60" rx="22" ry="24"/>
    <ellipse cx="80" cy="60" rx="13" ry="14" stroke-width="1.5" opacity="0.5"/>
  </svg>`,
  janggu: `<svg viewBox="0 0 110 110" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="20" cy="55" rx="16" ry="30"/>
    <ellipse cx="90" cy="55" rx="16" ry="30"/>
    <path d="M36,30 Q55,44 74,30"/>
    <path d="M36,80 Q55,66 74,80"/>
    <line x1="55" y1="30" x2="55" y2="80" stroke-width="1.5" opacity="0.35"/>
    <line x1="36" y1="55" x2="74" y2="55" stroke-width="1.5" opacity="0.35"/>
  </svg>`,
};

const HINTS = {
  string: 'Swipe or drag across the strings to play · Each string is a different note',
  wind:   'Blow into your microphone · Press the numbered holes to change the pitch',
  percussion: 'Tap the surfaces to play · Try building a repeating rhythm',
};

// Read URL param
const params = new URLSearchParams(location.search);
const id = params.get('id');
const inst = INSTRUMENTS[id];

if (!inst) {
  location.href = 'index.html';
}

// Populate info view
document.title = inst.name + ' · Echoes of Asia';
document.getElementById('period-tag').textContent   = inst.periodLabel;
document.getElementById('detail-name').textContent  = inst.name;
document.getElementById('detail-native').textContent = inst.native;
document.getElementById('info-history').textContent = inst.history;
document.getElementById('info-howto').textContent   = inst.howToPlay;
document.getElementById('play-name').textContent    = inst.name;
document.getElementById('play-hint').textContent    = HINTS[inst.type];
document.getElementById('detail-icon').innerHTML    = ICONS[id] || '';

const rb = document.getElementById('region-badge');
rb.textContent = inst.regionLabel;
rb.className   = `region-badge badge-${inst.regionType}`;

document.getElementById('type-badge').textContent = inst.typeLabel;

// Instrument photo
const photoWrap = document.getElementById('photo-wrap');
if (inst.photo) {
  const img = document.createElement('img');
  img.src = inst.photo;
  img.alt = inst.name;
  img.className = 'instrument-photo';
  img.loading = 'lazy';
  photoWrap.appendChild(img);
}

// Keyboard hint per instrument type
function getKbHint(inst) {
  if (inst.type === 'string')
    return `Keyboard: keys 1–${inst.notes.length} to pluck each string`;
  if (inst.type === 'wind')
    return `Keyboard: keys 1–${inst.holes.length} for holes · Space to blow`;
  if (inst.layout === 'gamelan')
    return 'Keyboard: keys 1–5 to hit each bar';
  return 'Keyboard: 1 = left drum · 2 = right drum';
}

// Start playing
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('info-view').style.display = 'none';
  const playView = document.getElementById('play-view');
  playView.classList.add('active');
  initPlay(inst, document.getElementById('play-area'));
  document.getElementById('kb-hint').textContent = getKbHint(inst);
});

// Exit play
document.getElementById('exit-btn').addEventListener('click', () => {
  if (window._windCleanup) { window._windCleanup(); window._windCleanup = null; }
  if (window._kbCleanup)   { window._kbCleanup();   window._kbCleanup   = null; }
  document.getElementById('play-view').classList.remove('active');
  document.getElementById('play-area').innerHTML = '';
  document.getElementById('info-view').style.display = '';
});
</script>
</body>
</html>
