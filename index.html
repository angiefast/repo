/* ── BUILD TIMELINE ── */
const timeline = document.getElementById('timeline');

PERIODS.forEach(period => {
  const section = document.createElement('section');
  section.className = 'period-section';

  const natureKey = period.id;
  section.innerHTML = `
    <div class="period-nature">${PERIOD_NATURE[natureKey]}</div>
    <div class="period-header">
      <div class="period-rule"></div>
      <div class="period-label">
        <span class="period-era">${period.label}</span>
        <span class="period-dates">${period.dates}</span>
      </div>
    </div>
    <div class="instruments-grid">
      ${period.instruments.map(id => {
        const inst = INSTRUMENTS[id];
        const badgeClass = `badge-${inst.regionType}`;
        return `
          <a href="instrument.html?id=${id}" class="instrument-card">
            <span class="c tl"></span><span class="c tr"></span>
            <span class="c bl"></span><span class="c br"></span>
            <div class="card-icon-area">${ICONS[id] || ''}</div>
            <span class="region-badge ${badgeClass}">${inst.regionLabel}</span>
            <h3 class="card-name">${inst.name}</h3>
            <p class="card-native">${inst.native}</p>
            <p class="card-desc">${inst.shortDesc}</p>
            <div class="card-interact">${inst.typeLabel}</div>
          </a>`;
      }).join('')}
    </div>
  `;

  timeline.appendChild(section);
});
